name: Daily Cafeteria Report Bot
on:
  schedule:
    - cron: '45 16 * * *' # 10:15 PM IST Daily
  workflow_dispatch:      # Manual trigger button

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Google Chrome & Minimal Linux Sandbox Core
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable \
            libasound2t64 libnspr4 libnss3 libgbm1 ca-certificates \
            fonts-liberation xdg-utils wget

      - name: Install Dependencies
        run: npm install

      - name: Unpack WhatsApp Session File
        run: |
          if [ -f "session.zip" ]; then
            unzip -o session.zip -d ./.wwebjs_auth/
            echo "✅ Session folder extracted successfully from file."
          else
            echo "⚠️ No session.zip found in repository root, attempting standard run."
          fi

      - name: Execute Script
        run: node server.js
