name: Daily Cafeteria Report Bot
on:
  schedule:
    - cron: '45 16 * * *' # 10:15 PM IST Daily
  workflow_dispatch:      # Manual trigger button

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Rolled back to 20 LTS for standard Puppeteer dependency harmony

      - name: Install System Sandbox Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libnspr4 libnss3 libgbm1 ca-certificates \
            fonts-liberation xdg-utils wget unzip

      - name: Install Dependencies
        run: npm install

      # 🌟 THE CRITICAL FIX: Forces Puppeteer to install a custom, perfectly matched browser copy
      - name: Install Pinned Chromium Binary
        run: npx puppeteer browsers install chrome

      - name: Unpack WhatsApp Session File
        run: |
          if [ -f "session.zip" ]; then
            unzip -qq -o session.zip -d ./.wwebjs_auth/ || true
            echo "✅ Session folder extracted cleanly."
          else
            echo "⚠️ No session.zip found in repository root, attempting standard run."
          fi
          exit 0

      - name: Execute Script
        run: node server.js
