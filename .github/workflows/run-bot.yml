name: Daily Cafeteria Report Bot
on:
  schedule:
    - cron: '45 16 * * *' # 10:15 PM IST Daily
  workflow_dispatch:      # Manual trigger button

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Google Chrome & Linux Sandbox Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable \
            gconf-service libasound2 libatk1.0-0 libc6 libcairo2 libcups2 \
            libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 \
            libgdk-pixbuf2.0-0 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 \
            libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 \
            libxcomposite1 libxcursor1 libxdamage1 libxext6 libxclipsel \
            libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 \
            ca-certificates fonts-liberation libappindicator1 libnss3 \
            lsb-release xdg-utils wget libgbm1

      - name: Install Dependencies
        run: npm install

      - name: Execute Script
        env:
          WHATSAPP_SESSION_DATA: ${{ secrets.WHATSAPP_SESSION_TOKEN }}
        run: node server.js
