name: Daily Cafeteria Report Bot
on:
  schedule:
    - cron: '45 16 * * *' # 10:15 PM IST Daily
  workflow_dispatch:      # Manual trigger button

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using 20 LTS for maximum library harmony

      - name: Install System Headless & Frame Buffer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable \
            libasound2t64 libnspr4 libnss3 libgbm1 ca-certificates \
            fonts-liberation xdg-utils wget unzip xvfb

      - name: Install Dependencies
        run: npm install

      - name: Unpack WhatsApp Session File
        run: |
          if [ -f "session.zip" ]; then
            unzip -qq -o session.zip -d ./.wwebjs_auth/ || true
            echo "✅ Session folder extracted cleanly."
          else
            echo "⚠️ No session.zip found in repository root, attempting standard run."
          fi
          exit 0

      # 🌟 THE FIX: Wrap execution in xvfb-run to provide a virtual screen context
      - name: Execute Script via Virtual Display
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" node server.js
